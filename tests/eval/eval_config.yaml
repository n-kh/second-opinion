metrics_to_run:
  - clinical_synthesis_correctness
  - guideline_compliance_accuracy

custom_metrics:
  - name: clinical_synthesis_correctness
    prompt_template: |
      You are an expert oncologist evaluating the performance of a clinical synthesis AI assistant.
      Assess the provided conversation trace. Check if the assistant successfully:
      1. Correctly infers the patient's cancer type/diagnosis from the uploaded document (e.g. breast cancer vs lung cancer).
      2. Correctly determines the clinical stage (e.g. Stage IIIA for breast cancer pathology, Stage IV for metastatic lung CT/biopsy).
      3. Extracts key biomarkers mentioned in the records (e.g. HER2+, ER/PR- for breast cancer; EGFR mutation for lung cancer).

      User Prompt: {prompt}
      Final Response: {response}
      Full Trace: {agent_data}

      Score Rubric:
      - 5: Extracted all diagnostic info, stage, and biomarkers perfectly and accurately.
      - 3: Identified the disease and stage correctly but missed some biomarker details, or staging details were slightly unclear.
      - 1: Failed to identify the diagnosis, stage, or biomarkers, or got them completely wrong.

      Return a JSON object in the exact format:
      {"score": <1|2|3|4|5>, "explanation": "<short reason>"}

  - name: guideline_compliance_accuracy
    prompt_template: |
      You are an expert oncology clinical quality auditor evaluating an NCCN guidelines verification assistant.
      Assess the provided conversation trace. Check if the assistant successfully:
      1. Correctly matched the patient profile with standard guidelines (NCCN guidelines).
      2. Audited the doctor's recommendation accurately (e.g. flagged standard chemotherapy as non-compliant/partially-compliant for EGFR-mutant Stage IV lung cancer, or verified chemotherapy + Herceptin as compliant for HER2+ breast cancer).
      3. Recommended correct next steps and missing tests (e.g. recommending brain MRI for Stage IV lung cancer, echocardiogram/MUGA or genetic testing for HER2+ breast cancer).

      User Prompt: {prompt}
      Final Response: {response}
      Full Trace: {agent_data}

      Score Rubric:
      - 5: Perfectly identified compliance status, explained discrepancies, and listed accurate next steps and missing tests.
      - 3: Correctly identified compliance status but had minor inaccuracies or missing recommendations in the next steps.
      - 1: Got the compliance status wrong, or recommended next steps that contradict clinical guidelines.

      Return a JSON object in the exact format:
      {"score": <1|2|3|4|5>, "explanation": "<short reason>"}
